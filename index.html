<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テトリス</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>テトリス</h1>
        <div class="game-wrapper">
            <div class="game-board" id="gameBoard"></div>
            <div class="sidebar">
                <div class="info-box">
                    <h2>スコア</h2>
                    <p id="score">0</p>
                </div>
                <div class="info-box">
                    <h2>レベル</h2>
                    <p id="level">1</p>
                </div>
                <div class="info-box">
                    <h2>ネクスト</h2>
                    <div class="next-board" id="nextBoard"></div>
                </div>
                <div class="buttons">
                    <button id="startBtn" class="btn">スタート</button>
                    <button id="pauseBtn" class="btn" disabled>ポーズ</button>
                    <button id="resetBtn" class="btn">リセット</button>
                </div>
                <div class="controls">
                    <p><strong>操作方法</strong></p>
                    <p>← → : ブロック移動</p>
                    <p>↑ : 回転</p>
                    <p>↓ : 高速落下</p>
                    <p>スペース : 一時停止</p>
                </div>
            </div>
        </div>
    </div>

    <script src="tetris.js"></script>
</body>
</html>
